<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFICIAL DDF REPORT</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 5rem;
            text-shadow: 3px 3px #ff00ff;
            margin-bottom: 10px;
            animation: shake 0.5s infinite;
        }

        .status-box {
            border: 2px solid #00ff00;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
        }

        .highlight {
            color: #ff00ff;
            font-weight: bold;
            text-transform: uppercase;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .laugh {
            margin-top: 20px;
            font-size: 1.5rem;
            color: yellow;
        }
    </style>
</head>
<body>

    <h1>DDF DETECTED</h1>

    <div class="status-box">
        <p>Current Status: <span class="highlight">ULTRA NOB</span></p>
        <p>Class Type: <span class="highlight">FEMBOY</span></p>
        <p>Skill Level: 0/100</p>
    </div>

    <div class="laugh">
        jaajajajajajajajajajaja
    </div>

</body>
</html>
