<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom YouTube</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #0f0f0f;
            color: white;
        }
        /* Navigation Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #0f0f0f;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }
        .search-container {
            display: flex;
            flex: 0 1 600px;
        }
        .search-bar {
            width: 100%;
            padding: 10px;
            border: 1px solid #303030;
            background-color: #121212;
            color: white;
            border-radius: 20px 0 0 20px;
        }
        .search-btn {
            padding: 10px 20px;
            background-color: #222;
            border: 1px solid #303030;
            color: white;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
        }
        .profile-icon {
            width: 35px;
            height: 35px;
            background-color: #888;
            border-radius: 50%;
        }

        /* Main Layout */
        .container {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            padding: 20px;
            background-color: #0f0f0f;
            height: 100vh;
            position: sticky;
            top: 60px;
        }
        .sidebar-item {
            padding: 10px 0;
            cursor: pointer;
            color: #f1f1f1;
        }
        .sidebar-item:hover {
            background-color: #272727;
            border-radius: 10px;
            padding-left: 10px;
            transition: 0.2s;
        }

        /* Video Grid */
        .video-grid {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            background-color: #0f0f0f;
        }
        .video-card {
            display: flex;
            flex-direction: column;
        }
        .thumbnail {
            width: 100%;
            height: 180px;
            background-color: #333;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .video-info {
            display: flex;
            gap: 10px;
        }
        .channel-avatar {
            width: 36px;
            height: 36px;
            background-color: #555;
            border-radius: 50%;
        }
        .video-details h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        .video-details p {
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">▶ MyTube</div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search">
            <button class="search-btn">Search</button>
        </div>
        <div class="profile-icon"></div>
    </div>

    <div class="container">

        <div class="sidebar">
            <div class="sidebar-item">🏠 Home</div>
            <div class="sidebar-item">⚡ Shorts</div>
            <div class="sidebar-item">📺 Subscriptions</div>
            <hr style="border: 1px solid #303030; margin: 15px 0;">
            <div class="sidebar-item">📁 Library</div>
            <div class="sidebar-item">⏱ History</div>
            <div class="sidebar-item">🎥 Your Videos</div>
        </div>

        <div class="video-grid">
            <div class="video-card">
                <div class="thumbnail"></div>
                <div class="video-info">
                    <div class="channel-avatar"></div>
                    <div class="video-details">
                        <h3>How to build a website</h3>
                        <p>Code Academy</p>
                        <p>120K views • 2 days ago</p>
                    </div>
                </div>
            </div>
            <div class="video-card">
                <div class="thumbnail"></div>
                <div class="video-info">
                    <div class="channel-avatar"></div>
                    <div class="video-details">
                        <h3>Learn HTML & CSS</h3>
                        <p>Web Dev Simplified</p>
                        <p>500K views • 1 month ago</p>
                    </div>
                </div>
            </div>
            <div class="video-card">
                <div class="thumbnail"></div>
                <div class="video-info">
                    <div class="channel-avatar"></div>
                    <div class="video-details">
                        <h3>Funny Cat Compilation</h3>
                        <p>MeowTube</p>
                        <p>1M views • 1 year ago</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
