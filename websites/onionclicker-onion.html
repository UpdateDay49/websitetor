<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onion Clicker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #2c1a3d; /* Deep purple background */
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #d8b4e2;
        }

        #onion {
            font-size: 120px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s ease-in-out;
            margin: 30px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
        }

        /* The clicking animation */
        #onion:active {
            transform: scale(0.9);
        }

        .stats {
            font-size: 28px;
            margin: 5px;
            font-weight: bold;
        }

        .ops-text {
            font-size: 16px;
            color: #bfa6c8;
            margin-bottom: 20px;
        }

        .shop {
            margin-top: 30px;
            padding: 20px;
            background-color: #3b2552;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            width: 320px;
        }

        .upgrade-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            font-size: 16px;
            cursor: pointer;
            background-color: #6a4c93;
            color: white;
            border: 2px solid #8c68c1;
            border-radius: 8px;
            transition: background-color 0.2s;
            text-align: left;
        }

        .upgrade-btn:hover:not(:disabled) {
            background-color: #8c68c1;
        }

        .upgrade-btn:disabled {
            background-color: #2a1b38;
            border-color: #4a3461;
            color: #777;
            cursor: not-allowed;
        }

        .cost-text {
            font-weight: bold;
            color: #ffb74d;
        }
    </style>
</head>
<body>

    <h1>🧅 Onion Clicker 🧅</h1>
    <div class="stats">Onions: <span id="onionCount">0</span></div>
    <div class="ops-text">per second: <span id="opsCount">0</span></div>

    <div id="onion" onclick="clickOnion()">🧅</div>

    <div class="shop">
        <h3>Upgrades</h3>

        <button class="upgrade-btn" id="btn-chopper" onclick="buyChopper()">
            🔪 Auto-Chopper<br>
            <small>Cost: <span id="cost-chopper" class="cost-text">15</span> | +1 onion/sec</small>
        </button>

        <button class="upgrade-btn" id="btn-farm" onclick="buyFarm()">
            🚜 Onion Farm<br>
            <small>Cost: <span id="cost-farm" class="cost-text">100</span> | +10 onions/sec</small>
        </button>

        <button class="upgrade-btn" id="btn-ogre" onclick="buyOgre()">
            👹 Friendly Ogre<br>
            <small>Cost: <span id="cost-ogre" class="cost-text">1100</span> | +80 onions/sec</small>
        </button>
    </div>

    <script>
        // Game State Variables
        let onions = 0;
        let onionsPerSecond = 0;

        // Upgrade Costs (These scale up as you buy them)
        let chopperCost = 15;
        let farmCost = 100;
        let ogreCost = 1100;

        // Hooking into the HTML elements
        const countDisplay = document.getElementById('onionCount');
        const opsDisplay = document.getElementById('opsCount');

        const btnChopper = document.getElementById('btn-chopper');
        const btnFarm = document.getElementById('btn-farm');
        const btnOgre = document.getElementById('btn-ogre');

        const costChopperDisplay = document.getElementById('cost-chopper');
        const costFarmDisplay = document.getElementById('cost-farm');
        const costOgreDisplay = document.getElementById('cost-ogre');

        // Core visual update function
        function updateDisplay() {
            // Math.floor ensures we don't show decimal onions from the passive generation
            countDisplay.textContent = Math.floor(onions);
            opsDisplay.textContent = onionsPerSecond;

            // Gray out buttons if the player can't afford them
            btnChopper.disabled = onions < chopperCost;
            btnFarm.disabled = onions < farmCost;
            btnOgre.disabled = onions < ogreCost;
        }

        // Manual clicking
        function clickOnion() {
            onions++;
            updateDisplay();
        }

        // --- Shop Functions ---

        function buyChopper() {
            if (onions >= chopperCost) {
                onions -= chopperCost;
                onionsPerSecond += 1;
                chopperCost = Math.ceil(chopperCost * 1.15); // Standard incremental game scaling (15% increase)
                costChopperDisplay.textContent = chopperCost;
                updateDisplay();
            }
        }

        function buyFarm() {
            if (onions >= farmCost) {
                onions -= farmCost;
                onionsPerSecond += 10;
                farmCost = Math.ceil(farmCost * 1.15);
                costFarmDisplay.textContent = farmCost;
                updateDisplay();
            }
        }

        function buyOgre() {
            if (onions >= ogreCost) {
                onions -= ogreCost;
                onionsPerSecond += 80;
                ogreCost = Math.ceil(ogreCost * 1.15);
                costOgreDisplay.textContent = ogreCost;
                updateDisplay();
            }
        }

        // --- Game Loop ---
        // Runs 10 times a second (every 100ms) to make passive generation feel smooth
        setInterval(() => {
            onions += onionsPerSecond / 10;
            updateDisplay();
        }, 100);

        // Initialize the screen on load
        updateDisplay();
    </script>
</body>
</html>
